<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MAIN CONTAINER -->
    <div class="container">

        <!-- HEADER -->
        <div class="header">
            <h1>🧠 Quiz Game</h1>
            <div class="score-board">
                <span>Score: <strong id="score">0</strong></span>
                <span>Question: <strong id="question-num">1</strong>/5</span>
                <span>Time: <strong id="timer">15</strong>s</span>
            </div>
        </div>

        <!-- QUIZ BOX -->
        <div class="quiz-box" id="quiz-box">

            <!-- PROGRESS BAR -->
            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <!-- QUESTION -->
            <div class="question-area">
                <h2 id="question-text">Question goes here</h2>
            </div>

            <!-- OPTIONS -->
            <div class="options" id="options">
                <button class="option" id="opt0"></button>
                <button class="option" id="opt1"></button>
                <button class="option" id="opt2"></button>
                <button class="option" id="opt3"></button>
            </div>

            <!-- FEEDBACK MESSAGE -->
            <div class="feedback" id="feedback"></div>

            <!-- NEXT BUTTON -->
            <button class="next-btn" id="next-btn" style="display:none">
                Next Question →
            </button>

        </div>

        <!-- RESULT BOX (hidden at start) -->
        <div class="result-box" id="result-box" style="display:none">
            <div class="result-emoji" id="result-emoji"></div>
            <h2 id="result-title"></h2>
            <p id="result-message"></p>
            <div class="final-score">
                <span id="final-score-text"></span>
            </div>
            <button class="restart-btn" id="restart-btn">
                🔄 Play Again
            </button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
